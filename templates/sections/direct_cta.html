<!-- FORA — direct_cta.html -->
<!-- Slot-based. One slot for the contact URL. Dark background — only dark section on the page. -->
<!--
  SLOTS:
  {{cta_heading}}       — short, direct. e.g. "Let's talk." or "Open to a conversation."
  {{cta_sub}}           — 1–2 sentences. What the next step is. Warm, not pushy.
  {{cta_button_label}}  — button text. e.g. "Send a message" or "Get in touch"
  {{cta_url}}           — mailto: or https:// link. From profile.json contact.
  {{cta_email}}         — displayed as plain text below the button. Optional reassurance.
-->

<section class="fora-cta">
  <div class="fora-cta__inner">

    <h2 class="fora-cta__heading">{{cta_heading}}</h2>
    <p class="fora-cta__sub">{{cta_sub}}</p>

    <div class="fora-cta__actions">
      <a href="{{cta_url}}" class="fora-cta__button">
        {{cta_button_label}}
      </a>
      <span class="fora-cta__email">{{cta_email}}</span>
    </div>

  </div>
</section>

<style>
.fora-cta {
  background: var(--color-ink);
  padding: var(--space-7) 0;
  margin-top: var(--space-7);
}
.fora-cta__inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 40px;
}
.fora-cta__heading {
  font-family: var(--font-sans);
  font-size: 40px;
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1.1;
  color: #FFFFFF;
  margin: 0 0 var(--space-2) 0;
  max-width: 560px;
}
.fora-cta__sub {
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 300;
  color: rgba(255, 255, 255, 0.6);
  line-height: 1.7;
  max-width: 480px;
  margin: 0 0 var(--space-4) 0;
}
.fora-cta__actions {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  flex-wrap: wrap;
}
.fora-cta__button {
  display: inline-block;
  background: #FFFFFF;
  color: var(--color-ink);
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  padding: 14px 28px;
  border: 1.5px solid #FFFFFF;
  transition: background 0.1s, color 0.1s;
}
.fora-cta__button:hover {
  background: transparent;
  color: #FFFFFF;
}
.fora-cta__email {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.06em;
  color: rgba(255, 255, 255, 0.4);
}

@media (max-width: 640px) {
  .fora-cta {
    padding: var(--space-5) 0;
    margin-top: var(--space-5);
  }
  .fora-cta__inner {
    padding: 0 24px;
  }
  .fora-cta__heading {
    font-size: 32px;
  }
  .fora-cta__actions {
    flex-direction: column;
    align-items: flex-start;
  }
}
</style>
