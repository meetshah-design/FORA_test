<!-- FORA — nav.html -->
<!-- Static section. Slots filled from content_brief.json, not by LLM. -->
<!-- Slots: {{designer_name}} {{company_name}} {{portfolio_url}} {{company_logo_url}} -->

<nav class="fora-nav">
  <div class="fora-nav__inner">
    <span class="fora-nav__name">{{designer_name}}</span>
    <span class="fora-nav__badge">
      <img src="{{company_logo_url}}" alt="{{company_name}}" class="fora-nav__logo" onerror="this.style.display='none'">
      For {{company_name}}
    </span>
    <a href="{{portfolio_url}}" target="_blank" rel="noopener" class="fora-nav__portfolio">Portfolio</a>
  </div>
</nav>

<style>
.fora-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--color-bg);
  border-bottom: var(--border);
}
.fora-nav__inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 40px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.fora-nav__name {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  color: var(--color-ink);
  letter-spacing: -0.01em;
  flex: 1;
}
.fora-nav__badge {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--color-muted);
  background: var(--color-surface);
  border: var(--border);
  padding: 4px 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.fora-nav__logo {
  width: 16px;
  height: 16px;
  object-fit: contain;
  border-radius: 2px;
  display: inline-block;
  vertical-align: middle;
}
.fora-nav__portfolio {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-muted);
  text-decoration: none;
  transition: color 0.1s;
}
.fora-nav__portfolio:hover {
  color: var(--color-ink);
}

@media (max-width: 640px) {
  .fora-nav__inner {
    padding: 0 24px;
  }
  .fora-nav__portfolio {
    display: none;
  }
}
</style>
