<!-- FORA — signal_cards.html -->
<!-- Slot-based. Codegen generates signal card HTML from profile.json signals. -->
<!-- This section can appear standalone OR be injected into act1_hero via {{act1_signals_html}}. -->
<!--
  SLOTS:
  {{signals_eyebrow}}   — e.g. "At a glance" or left empty if inside act1
  {{signals_grid_html}} — 3–6 signal cards generated by codegen
                          Each card: label (signal name) + value (evidence, 1 sentence)
                          Codegen selects which signals to surface based on JD match.
                          Uses signals[].best_for_roles from profile.json to prioritise.
-->

<section class="fora-signals">
  <div class="fora-signals__inner">

    <span class="fora-eyebrow">{{signals_eyebrow}}</span>

    <div class="fora-signals__grid">
      {{signals_grid_html}}
    </div>

  </div>
</section>

<style>
.fora-signals {
  padding: var(--space-6) 0;
  border-top: var(--border);
}
.fora-signals__inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 40px;
}
.fora-signals__grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 1px;
  background: var(--color-border);
  border: var(--border);
  margin-top: var(--space-3);
  max-width: 900px;
}

/* Signal card — rendered by codegen per signal item */
.fora-signal-card {
  background: var(--color-bg);
  padding: 18px 20px;
  transition: background 0.1s;
}
.fora-signal-card:hover {
  background: var(--color-surface);
}
.fora-signal-card__label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--color-muted);
  margin-bottom: 6px;
  display: block;
}
.fora-signal-card__value {
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 400;
  color: var(--color-ink);
  line-height: 1.5;
  margin: 0 0 4px 0;
}
.fora-signal-card__sub {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 300;
  color: var(--color-mid);
  line-height: 1.55;
  margin: 0;
}

@media (max-width: 760px) {
  .fora-signals__grid {
    grid-template-columns: 1fr 1fr;
  }
}
@media (max-width: 640px) {
  .fora-signals {
    padding: var(--space-5) 0;
  }
  .fora-signals__inner {
    padding: 0 24px;
  }
  .fora-signals__grid {
    grid-template-columns: 1fr 1fr;
  }
}
</style>
